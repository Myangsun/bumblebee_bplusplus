# Training Configuration for Baseline Model
# This config file contains all hyperparameters for the baseline training pipeline
# Modify values here instead of editing the Python code

# ============================================================================
# TRAINING HYPERPARAMETERS
# ============================================================================

training:
  # Number of training epochs
  epochs: 100

  # Batch size for training and validation
  batch_size: 8

  # Early stopping patience (number of epochs with no improvement before stopping)
  patience: 15

  # Learning rate for the optimizer
  learning_rate: 0.0001

  # Image size (both width and height - images resized to this size)
  image_size: 640

  # Number of workers for data loading (0 = main process only, >0 = parallel workers)
  num_workers: 2

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================

model:
  # Model type: "hierarchical" or other architectures
  type: "hierarchical"

  # Backbone architecture
  backbone: "resnet50"

  # Hidden layer size for classification branches
  hidden_size: 512

  # Dropout rate for regularization
  dropout_rate: 0.5

# ============================================================================
# OPTIMIZER CONFIGURATION
# ============================================================================

optimizer:
  # Type of optimizer: "adam" or "sgd"
  type: "adam"

  # Weight decay for L2 regularization
  weight_decay: 0.0

# ============================================================================
# TRAINING STRATEGY
# ============================================================================

strategy:
  # Strategy name for documentation
  name: "OPTION 3: Aggressive"

  # Strategy description
  description: "Larger batch size for better gradients, more epochs and patience for thorough training"

  # Whether to use CUDA if available
  use_cuda: true
