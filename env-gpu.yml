name: bbp
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  # PyTorch with CUDA 12.1 (works with CUDA 12.4 drivers on the cluster)
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  # Core scientific stack
  - numpy<2.0
  - scipy=1.10.1
  - pandas
  - scikit-learn>=1.2,<1.4
  - pillow
  - pip
  - setuptools
  - wheel
  # Nice to have
  - pyyaml
  - tqdm
  - matplotlib
  - rich
  - psutil
  - pip:
      - opencv-python-headless
      - albumentations
      - timm
